<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA · Cloud Automation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080b14;--surface:#0f1320;--card:#131827;--border:#1e2438;--purple:#7c6aff;--blue:#60a5fa;--green:#4ade80;--amber:#fb923c;--red:#f87171;--muted:#4a5568;--text:#e2e8f0;--subtext:#94a3b8}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Header ─────────────────────────────────────────────────── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.live-ring{width:9px;height:9px;border-radius:50%;background:var(--green);animation:ring 2s infinite}
@keyframes ring{0%{box-shadow:0 0 0 0 #4ade8088}70%{box-shadow:0 0 0 7px #4ade8000}100%{box-shadow:0 0 0 0 #4ade8000}}
header h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
.h-pill{font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 10px;border-radius:20px;background:linear-gradient(135deg,#7c6aff,#4f46e5);color:#fff}
.h-stats{display:flex;gap:20px;margin-left:auto;font-size:12px}
.h-stat{display:flex;align-items:center;gap:6px;color:var(--subtext)}
.h-stat b{font-size:15px;font-weight:700}
.h-stat.blue b{color:var(--blue)} .h-stat.green b{color:var(--green)} .h-stat.amber b{color:var(--amber)} .h-stat.red b{color:var(--red)}
.auth-bar{display:flex;align-items:center;gap:8px;margin-left:auto}
.auth-bar input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:11px;width:180px;font-family:monospace}
.auth-bar .btn-small{background:var(--surface);border:1px solid var(--border);color:var(--subtext);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer}
.auth-bar .btn-small:hover{border-color:var(--purple);color:var(--text)}
.auth-bar .key-status{color:var(--green);font-size:11px}
.btn{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,#7c6aff,#4f46e5);color:#fff}
.btn-primary:hover{box-shadow:0 0 16px #7c6aff55;transform:translateY(-1px)}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--subtext)}
.btn-ghost:hover{border-color:var(--purple);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{background:#450a0a44;border:1px solid #7f1d1d;color:var(--red)}
.btn-danger:hover{background:#7f1d1d55}

/* ── Layout ──────────────────────────────────────────────────── */
.layout{display:grid;grid-template-columns:1fr 320px;gap:0;height:calc(100vh - 53px)}
.panel-area{padding:24px;overflow-y:auto}
.feed-area{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

/* ── Panel board ─────────────────────────────────────────────── */
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.panel-title{font-size:13px;font-weight:600;color:var(--subtext);text-transform:uppercase;letter-spacing:.7px}
.panel-actions{display:flex;gap:8px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.empty-board{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:12px;color:var(--muted);font-size:14px}
.empty-board svg{opacity:.25}
.empty-board span{font-size:12px}

/* ── Automation Cards ────────────────────────────────────────── */
.wf-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:0;overflow:hidden;transition:border-color .3s,box-shadow .3s;position:relative;display:flex;flex-direction:column}
.wf-card.running{border-color:var(--purple);box-shadow:0 0 20px #7c6aff22,0 0 40px #7c6aff0a;animation:card-pulse 3s ease-in-out infinite}
.wf-card.completed{border-color:#166534}
.wf-card.failed{border-color:#7f1d1d}
@keyframes card-pulse{0%,100%{box-shadow:0 0 16px #7c6aff22,0 0 32px #7c6aff08}50%{box-shadow:0 0 28px #7c6aff44,0 0 56px #7c6aff18}}

.card-top{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 8px;border-radius:20px}
.s-running{background:#1e1b4b;color:#a78bfa;border:1px solid #3730a3}
.s-completed{background:#14532d44;color:var(--green);border:1px solid #166534}
.s-failed{background:#450a0a44;color:var(--red);border:1px solid #7f1d1d}
.s-pending{background:#1c1917;color:#a8a29e;border:1px solid #292524}
.spin{display:inline-block;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.card-name{font-size:12px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 4px;border-radius:4px;font-size:12px;line-height:1;transition:color .15s}
.card-del:hover{color:var(--red)}

.card-body{padding:14px;flex:1}
.current-op{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;min-height:20px;display:flex;align-items:center;gap:6px}
.op-icon{font-size:16px;flex-shrink:0}

.step-pipeline{display:flex;align-items:center;gap:0;margin-bottom:10px}
.step-node{width:10px;height:10px;border-radius:50%;flex-shrink:0;position:relative;z-index:1}
.step-node.done{background:var(--purple)}
.step-node.active{background:var(--purple);box-shadow:0 0 0 3px #7c6aff33;animation:node-pulse 1.2s ease-in-out infinite}
@keyframes node-pulse{0%,100%{box-shadow:0 0 0 3px #7c6aff33}50%{box-shadow:0 0 0 6px #7c6aff44}}
.step-node.pending{background:var(--border);border:1.5px solid var(--muted)}
.step-connector{flex:1;height:2px;background:var(--border);min-width:6px;margin:0 2px}
.step-connector.done{background:var(--purple)}
.step-label{font-size:10px;color:var(--muted);letter-spacing:.3px}

.card-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted);font-family:monospace}
.result-snippet{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Event Feed ──────────────────────────────────────────────── */
.feed-head{padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--subtext);display:flex;align-items:center;justify-content:space-between}
.feed-scroll{flex:1;overflow-y:auto;padding:0}
.feed-item{padding:10px 16px;border-bottom:1px solid var(--border);font-size:11px;cursor:default;transition:background .1s}
.feed-item:hover{background:#ffffff08}
.feed-ts{color:var(--muted);font-family:monospace;font-size:10px}
.feed-wf{color:#a78bfa;font-family:monospace;font-size:10px;display:block;margin:1px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-body{color:var(--subtext);margin-top:2px}
.feed-empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:12px}

/* ── Builder Overlay ─────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:#00000088;z-index:100;display:none;justify-content:flex-end}
.overlay.open{display:flex}
.drawer{width:420px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;animation:slide-in .2s ease-out}
@keyframes slide-in{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.drawer-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.drawer-head h2{font-size:15px;font-weight:600}
.close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px}
.close-btn:hover{color:var(--text);background:var(--border)}
.drawer-body{flex:1;overflow-y:auto;padding:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--subtext);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select{width:100%;background:#0a0d18;border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--purple)}
.field input::placeholder{color:var(--muted)}
.templates-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.tpl-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:all .15s;font-size:12px}
.tpl-card:hover{border-color:var(--purple);background:#131827}
.tpl-card .tpl-name{font-weight:600;color:var(--text);margin-bottom:2px}
.tpl-card .tpl-steps{font-size:10px;color:var(--muted)}
.steps-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.step-row{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px;position:relative}
.step-num{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px}
.step-row select{margin-bottom:6px}
.step-params{display:flex;flex-direction:column;gap:5px}
.step-params input{font-size:11px;padding:5px 10px}
.step-row .del-step{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px}
.step-row .del-step:hover{color:var(--red)}
.drawer-foot{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
.section-label{font-size:11px;font-weight:700;color:var(--subtext);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
</style>
</head>
<body>

<header>
  <div class="live-ring"></div>
  <h1>Cloud Automation</h1>
  <span class="h-pill">AURA</span>
  <div class="h-stats">
    <div class="h-stat blue"><b id="s-total">0</b> Total</div>
    <div class="h-stat green"><b id="s-ok">0</b> Done</div>
    <div class="h-stat amber"><b id="s-run">0</b> Running</div>
    <div class="h-stat red"><b id="s-fail">0</b> Failed</div>
  </div>
  <button class="btn btn-primary" onclick="openBuilder()" style="margin-left:16px">+ New Automation</button>
  <div class="auth-bar" id="auth-bar"></div>
</header>

<div class="layout">
  <!-- Panel board -->
  <div class="panel-area">
    <div class="panel-header">
      <span class="panel-title">Automation Panel</span>
      <div class="panel-actions">
        <button class="btn btn-ghost btn-sm" onclick="load()">↻ Refresh</button>
        <button class="btn btn-ghost btn-sm" onclick="clearAll()">Clear All</button>
      </div>
    </div>
    <div class="card-grid" id="card-grid">
      <div class="empty-board" id="empty-msg">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <div>No automations running</div>
        <span>Click <b>+ New Automation</b> to configure and run a cloud workflow</span>
      </div>
    </div>
  </div>

  <!-- Event feed -->
  <div class="feed-area">
    <div class="feed-head">
      <span>Live Events</span>
      <span id="feed-count" style="color:var(--muted);font-weight:400"></span>
    </div>
    <div class="feed-scroll" id="feed-scroll">
      <div class="feed-empty">No events yet</div>
    </div>
  </div>
</div>

<!-- Builder Drawer -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="drawer">
    <div class="drawer-head">
      <h2>Configure Automation</h2>
      <button class="close-btn" onclick="closeBuilder()">✕</button>
    </div>
    <div class="drawer-body">
      <!-- Templates -->
      <div class="section-label">Quick Templates</div>
      <div class="templates-grid" id="tpl-grid"></div>
      <hr class="divider">
      <!-- Name -->
      <div class="field">
        <label>Workflow Name</label>
        <input id="wf-name" type="text" placeholder="e.g. nightly-backup">
      </div>
      <!-- Steps -->
      <div class="section-label" style="margin-bottom:8px">Steps <span style="color:var(--muted);font-weight:400;text-transform:none">(run in order)</span></div>
      <div class="steps-list" id="steps-list"></div>
      <button class="btn btn-ghost btn-sm" onclick="addStep()" style="width:100%;margin-bottom:4px">+ Add Step</button>
    </div>
    <div class="drawer-foot">
      <button class="btn btn-ghost" style="flex:1" onclick="saveWorkflow()">💾 Save</button>
      <button class="btn btn-primary" style="flex:1" onclick="runWorkflow()">▶ Run Now</button>
    </div>
  </div>
</div>

<script>
// ── Global Auth Override ────────────────────────────────────────────────────────
(function() {
  const originalFetch = window.fetch;
  let apiKey = localStorage.getItem('aura_api_key') || '';
  
  window.fetch = async function(url, options = {}) {
    const headers = { ...options.headers };
    if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;
    const res = await originalFetch(url, { ...options, headers });
    if (res.status === 401 && apiKey) {
      alert('Invalid API key. Please refresh and enter a valid key.');
      apiKey = '';
      localStorage.removeItem('aura_api_key');
    }
    return res;
  };
})();

// ── Auth UI ─────────────────────────────────────────────────────────────────
function renderAuthBar() {
  const bar = document.getElementById('auth-bar');
  if (!bar) return;
  const apiKey = localStorage.getItem('aura_api_key') || '';
  if (apiKey) {
    bar.innerHTML = `<span class="key-status">✓ Key configured</span> <button onclick="localStorage.removeItem('aura_api_key');renderAuthBar()" class="btn-small">Clear</button>`;
  } else {
    bar.innerHTML = `<input type="password" id="api-key-input" placeholder="Enter API key (sk-aura-...)" onkeydown="if(event.key==='Enter'){localStorage.setItem('aura_api_key',this.value.trim());renderAuthBar();location.reload()}"> <button onclick="const inp=document.getElementById('api-key-input');localStorage.setItem('aura_api_key',inp.value.trim());renderAuthBar();location.reload()" class="btn-small">Save</button>`;
  }
}

const CLOUD_OPS = {
  // EC2
  describe_instances:  { label:'EC2: Describe Instances',  params:[{k:'region',l:'Region',d:'us-east-1'},{k:'filter_state',l:'State Filter',d:'running'}] },
  start_instances:     { label:'EC2: Start Instances',     params:[{k:'instance_ids',l:'Instance IDs',d:'i-0abc1234'},{k:'region',l:'Region',d:'us-east-1'}] },
  stop_instances:      { label:'EC2: Stop Instances',      params:[{k:'instance_ids',l:'Instance IDs',d:'i-0abc1234'},{k:'region',l:'Region',d:'us-east-1'}] },
  reboot_instances:    { label:'EC2: Reboot Instances',    params:[{k:'instance_ids',l:'Instance IDs',d:'i-0abc1234'},{k:'region',l:'Region',d:'us-east-1'}] },
  terminate_instances: { label:'EC2: Terminate Instances', params:[{k:'instance_ids',l:'Instance IDs',d:'i-0abc1234'},{k:'region',l:'Region',d:'us-east-1'}] },
  // RDS
  start_db:            { label:'RDS: Start DB Instance',   params:[{k:'identifier',l:'DB Identifier',d:'mydb'},{k:'region',l:'Region',d:'us-east-1'}] },
  stop_db:             { label:'RDS: Stop DB Instance',    params:[{k:'identifier',l:'DB Identifier',d:'mydb'},{k:'region',l:'Region',d:'us-east-1'}] },
  reboot_db:           { label:'RDS: Reboot DB Instance',  params:[{k:'identifier',l:'DB Identifier',d:'mydb'},{k:'region',l:'Region',d:'us-east-1'}] },
  describe_db:         { label:'RDS: Describe DB',         params:[{k:'identifier',l:'DB Identifier',d:'mydb'},{k:'region',l:'Region',d:'us-east-1'}] },
  // Lambda
  invoke_lambda:       { label:'Lambda: Invoke Function',   params:[{k:'function_name',l:'Function Name',d:'my-function'},{k:'region',l:'Region',d:'us-east-1'},{k:'payload',l:'Payload (JSON)',d:'{}'}] },
  list_functions:      { label:'Lambda: List Functions',   params:[{k:'region',l:'Region',d:'us-east-1'}] },
  get_function_config: { label:'Lambda: Get Config',        params:[{k:'function_name',l:'Function Name',d:'my-function'},{k:'region',l:'Region',d:'us-east-1'}] },
  // ECS
  run_task:            { label:'ECS: Run Task',            params:[{k:'cluster',l:'Cluster',d:'my-cluster'},{k:'task_definition',l:'Task Definition',d:'my-task:1'},{k:'region',l:'Region',d:'us-east-1'}] },
  stop_task:           { label:'ECS: Stop Task',           params:[{k:'cluster',l:'Cluster',d:'my-cluster'},{k:'task_arn',l:'Task ARN',d:'arn:aws:ecs:...'},{k:'region',l:'Region',d:'us-east-1'}] },
  describe_task:       { label:'ECS: Describe Task',       params:[{k:'cluster',l:'Cluster',d:'my-cluster'},{k:'task_arn',l:'Task ARN',d:'arn:aws:ecs:...'},{k:'region',l:'Region',d:'us-east-1'}] },
  list_clusters:       { label:'ECS: List Clusters',       params:[{k:'region',l:'Region',d:'us-east-1'}] },
  // S3
  list_buckets:        { label:'S3: List Buckets',         params:[{k:'region',l:'Region',d:'us-east-1'}] },
  list_objects:        { label:'S3: List Objects',         params:[{k:'bucket',l:'Bucket Name',d:'my-bucket'},{k:'region',l:'Region',d:'us-east-1'}] },
  get_object:          { label:'S3: Get Object',            params:[{k:'bucket',l:'Bucket Name',d:'my-bucket'},{k:'key',l:'Object Key',d:'path/to/file.txt'},{k:'region',l:'Region',d:'us-east-1'}] },
  put_object:          { label:'S3: Put Object',            params:[{k:'bucket',l:'Bucket Name',d:'my-bucket'},{k:'key',l:'Object Key',d:'path/to/file.txt'},{k:'content',l:'Content',d:'Hello World'},{k:'region',l:'Region',d:'us-east-1'}] },
  delete_object:       { label:'S3: Delete Object',         params:[{k:'bucket',l:'Bucket Name',d:'my-bucket'},{k:'key',l:'Object Key',d:'path/to/file.txt'},{k:'region',l:'Region',d:'us-east-1'}] },
  // CloudWatch
  describe_alarms:     { label:'CloudWatch: Describe Alarms', params:[{k:'alarm_names',l:'Alarm Names (comma)',d:'my-alarm'},{k:'region',l:'Region',d:'us-east-1'}] },
  set_alarm_state:     { label:'CloudWatch: Set Alarm State', params:[{k:'alarm_name',l:'Alarm Name',d:'my-alarm'},{k:'state_value',l:'State (OK/ALARM)',d:'OK'},{k:'state_reason',l:'Reason',d:'Manual action'},{k:'region',l:'Region',d:'us-east-1'}] },
  // Auto Scaling
  scale_asg:           { label:'ASG: Scale',               params:[{k:'asg_name',l:'ASG Name',d:'my-asg'},{k:'desired_capacity',l:'Desired Capacity',d:'3'},{k:'region',l:'Region',d:'us-east-1'}] },
  // SSM
  run_ssm_command:     { label:'SSM: Run Command',         params:[{k:'instance_ids',l:'Instance IDs',d:'i-0abc1234'},{k:'command',l:'Command',d:'systemctl status nginx'},{k:'region',l:'Region',d:'us-east-1'}] },
  // Metrics
  get_metrics:         { label:'CloudWatch: Get Metrics',  params:[{k:'instance_ids',l:'Instance IDs',d:'i-0abc1234'},{k:'metric',l:'Metric',d:'CPUUtilization'},{k:'region',l:'Region',d:'us-east-1'}] },
};

const OP_ICONS = {
  // EC2
  describe_instances:'🔍', start_instances:'▶', stop_instances:'⏹', reboot_instances:'↺', terminate_instances:'🗑',
  // RDS
  start_db:'▶', stop_db:'⏹', reboot_db:'↺', describe_db:'🔍',
  // Lambda
  invoke_lambda:'⚡', list_functions:'📋', get_function_config:'⚙',
  // ECS
  run_task:'🚀', stop_task:'⏹', describe_task:'🔍', list_clusters:'📋',
  // S3
  list_buckets:'📦', list_objects:'📁', get_object:'📄', put_object:'💾', delete_object:'🗑',
  // CloudWatch
  describe_alarms:'🔔', set_alarm_state:'⚠',
  // ASG
  scale_asg:'⚖',
  // SSM
  run_ssm_command:'⌨',
  // Metrics
  get_metrics:'📊',
  completed:'✓',
};

let steps = [];

// ── Drawer ────────────────────────────────────────────────────────────────────
function openBuilder() {
  document.getElementById('overlay').classList.add('open');
  loadTemplates();
  if (steps.length === 0) addStep();
}
function closeBuilder() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeBuilder(); }

async function loadTemplates() {
  const tplGrid = document.getElementById('tpl-grid');
  try {
    const res = await fetch('/dashboard2/api/templates');
    const templates = await res.json();
    tplGrid.innerHTML = templates.map(t => `
      <div class="tpl-card" onclick='applyTemplate(${JSON.stringify(t)})'>
        <div class="tpl-name">${t.name}</div>
        <div class="tpl-steps">${t.steps.length} steps</div>
      </div>`).join('');
  } catch(e) { tplGrid.innerHTML = '<span style="color:var(--muted);font-size:11px">Could not load templates</span>'; }
}

function applyTemplate(tpl) {
  document.getElementById('wf-name').value = tpl.name;
  steps = tpl.steps.map(s => ({ ...s }));
  renderSteps();
}

function addStep() {
  steps.push({ operation: 'describe_instances', params: {} });
  renderSteps();
}

function renderSteps() {
  const list = document.getElementById('steps-list');
  list.innerHTML = steps.map((s, i) => {
    const op = CLOUD_OPS[s.operation] || CLOUD_OPS.describe_instances;
    const opOptions = Object.entries(CLOUD_OPS).map(([k,v]) =>
      `<option value="${k}" ${k===s.operation?'selected':''}>${v.label}</option>`).join('');
    const paramInputs = op.params.map(p =>
      `<input type="text" data-step="${i}" data-param="${p.k}" placeholder="${p.l}" value="${s.params[p.k]||p.d}">`).join('');
    return `<div class="step-row">
      <div class="step-num">STEP ${i+1}</div>
      <select class="field" data-step="${i}" onchange="changeOp(${i},this.value)">${opOptions}</select>
      <div class="step-params">${paramInputs}</div>
      <button class="del-step" onclick="delStep(${i})">✕</button>
    </div>`;
  }).join('');
  // Attach param listeners
  list.querySelectorAll('[data-param]').forEach(el => {
    el.addEventListener('input', e => {
      const t = e.target; const si = +t.dataset.step; const pk = t.dataset.param;
      if (!steps[si].params) steps[si].params = {};
      steps[si].params[pk] = t.value;
    });
  });
}

function changeOp(i, op) {
  steps[i].operation = op;
  steps[i].params = {};
  renderSteps();
}
function delStep(i) { steps.splice(i, 1); renderSteps(); }

function collectWorkflow() {
  const name = document.getElementById('wf-name').value.trim() || 'my-workflow';
  // Collect current param values from DOM
  document.getElementById('steps-list').querySelectorAll('[data-param]').forEach(el => {
    const si = +el.dataset.step; const pk = el.dataset.param;
    if (!steps[si].params) steps[si].params = {};
    steps[si].params[pk] = el.value;
  });
  return { name, steps: steps.map(s => ({ operation: s.operation, params: { ...s.params } })) };
}

async function runWorkflow() {
  if (steps.length === 0) return alert('Add at least one step.');
  const wf = collectWorkflow();
  const res = await fetch('/dashboard2/api/run', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(wf) });
  if (res.ok) { closeBuilder(); load(); }
}

async function saveWorkflow() {
  if (steps.length === 0) return alert('Add at least one step.');
  const wf = collectWorkflow();
  await fetch('/dashboard2/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(wf) });
  closeBuilder();
}

// ── Card Board ───────────────────────────────────────────────────────────────
async function deleteWf(id, e) {
  e.stopPropagation();
  await fetch(`/dashboard2/api/workflows/${encodeURIComponent(id)}`, { method:'DELETE' });
  load();
}

async function clearAll() {
  const res = await fetch('/dashboard2/api/workflows');
  const { workflows } = await res.json();
  await Promise.all(workflows.map(w => fetch(`/dashboard2/api/workflows/${encodeURIComponent(w.workflow_id)}`, { method:'DELETE' })));
  load();
}

function statusBadge(s) {
  const map = {
    running:   ['s-running',  `<span class="spin">⟳</span> RUNNING`],
    completed: ['s-completed','✓ DONE'],
    failed:    ['s-failed',   '✗ FAILED'],
    pending:   ['s-pending',  '◌ PENDING'],
  };
  const [cls,label] = map[s] || ['s-pending', s.toUpperCase()];
  return `<span class="status-badge ${cls}">${label}</span>`;
}

function renderCard(w) {
  const data = w.data || {};
  const total = data.total_steps || 1;
  const cur   = data.step_index ?? 0;
  const op    = data.step || 'unknown';
  const icon  = OP_ICONS[op] || '⚙';
  const opLabel = CLOUD_OPS[op]?.label || op.replace(/_/g,' ');
  const ts    = w.timestamp ? new Date(w.timestamp).toLocaleTimeString() : '—';
  const result = data.last_result || data.workflow_name || '';

  // Step pipeline dots
  const dots = Array.from({length: total}, (_,i) => {
    const cls = i < cur ? 'done' : i === cur && w.status === 'running' ? 'active' : i <= cur && w.status === 'completed' ? 'done' : 'pending';
    const conn = i < total-1 ? `<div class="step-connector ${i < cur || w.status==='completed' ? 'done' : ''}"></div>` : '';
    return `<div class="step-node ${cls}"></div>${conn}`;
  }).join('');

  return `<div class="wf-card ${w.status}" id="card-${CSS.escape(w.workflow_id)}">
    <div class="card-top">
      ${statusBadge(w.status)}
      <span class="card-name">${data.workflow_name || w.workflow_id}</span>
      <button class="card-del" onclick="deleteWf('${w.workflow_id}',event)" title="Remove">✕</button>
    </div>
    <div class="card-body">
      <div class="current-op">
        <span class="op-icon">${w.status==='completed'?'✓':w.status==='failed'?'✗':icon}</span>
        <span>${w.status==='completed'?'Completed successfully':w.status==='failed'?'Failed':opLabel}</span>
      </div>
      <div class="step-pipeline">${dots}</div>
      <div class="step-label">Step ${Math.min(cur+1,total)} of ${total}</div>
    </div>
    <div class="card-foot">
      <span class="result-snippet" title="${result}">${result || w.workflow_id}</span>
      <span>${ts}</span>
    </div>
  </div>`;
}

function feedBadge(s) {
  const c = {running:'#a78bfa',completed:'#4ade80',failed:'#f87171',pending:'#a8a29e'}[s]||'#a8a29e';
  return `<span style="color:${c};font-weight:600">${s}</span>`;
}

async function load() {
  try {
    const res = await fetch('/dashboard2/api/workflows');
    if (!res.ok) throw new Error(res.status);
    const { workflows, events, stats } = await res.json();

    document.getElementById('s-total').textContent = stats.total;
    document.getElementById('s-ok').textContent    = stats.completed;
    document.getElementById('s-run').textContent   = stats.running;
    document.getElementById('s-fail').textContent  = stats.failed;

    const grid = document.getElementById('card-grid');
    const empty = document.getElementById('empty-msg');
    if (!workflows.length) {
      grid.innerHTML = '';
      grid.appendChild(empty); empty.style.display='flex';
    } else {
      empty.style.display='none';
      grid.innerHTML = workflows.slice().reverse().map(renderCard).join('');
    }

    const feed = document.getElementById('feed-scroll');
    document.getElementById('feed-count').textContent = events.length ? `(${events.length})` : '';
    if (!events.length) {
      feed.innerHTML = '<div class="feed-empty">No events yet</div>';
    } else {
      feed.innerHTML = events.slice().reverse().map(e => {
        const d = e.data || {}; const ts = e.timestamp ? new Date(e.timestamp).toLocaleTimeString() : '';
        const detail = d.last_result ? d.last_result.slice(0,60) : (d.step || '');
        return `<div class="feed-item">
          <span class="feed-ts">${ts}</span>
          <span class="feed-wf">${d.workflow_name || e.workflow_id}</span>
          <div class="feed-body">${feedBadge(e.status)} — ${detail}</div>
        </div>`;
      }).join('');
    }
  } catch(e) { console.error(e); }
}

renderAuthBar();
load();
setInterval(load, 3000);
</script>
